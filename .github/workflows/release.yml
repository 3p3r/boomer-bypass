name: Release

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-22.04
            artifact: bb-linux-x64
          - name: linux-arm64
            os: ubuntu-22.04-arm
            artifact: bb-linux-arm64
          - name: win-x64
            os: windows-latest
            artifact: bb-win-x64.exe
          - name: mac-x64
            os: macos-latest
            artifact: bb-mac-x64
          - name: mac-arm64
            os: macos-latest
            artifact: bb-mac-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bundle
        run: npm run bundle

      - name: Compile binary
        run: npm run compile
        env:
          ALL: '0'

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  assemble:
    name: Assemble Universal Binaries
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create bb-mac (self-extracting wrapper)
        run: |
          mkdir -p bin
          chmod +x artifacts/bb-mac-x64/bb-mac-x64 artifacts/bb-mac-arm64/bb-mac-arm64
          tar -czf /tmp/bb-mac-bins.tar.gz \
            -C artifacts/bb-mac-x64 bb-mac-x64 \
            -C ../../artifacts/bb-mac-arm64 bb-mac-arm64
          TARB64=$(base64 < /tmp/bb-mac-bins.tar.gz)
          cat > bin/bb-mac << WRAPPER
          #!/bin/sh
          set -e
          ARCH=\$(uname -m)
          TMP=\$(mktemp -d)
          trap 'rm -rf "\$TMP"' EXIT
          echo '$TARB64' | base64 -d > "\$TMP/bins.tar.gz"
          tar -xzf "\$TMP/bins.tar.gz" -C "\$TMP"
          if [ "\$ARCH" = "arm64" ]; then
            exec "\$TMP/bb-mac-arm64" "\$@"
          else
            exec "\$TMP/bb-mac-x64" "\$@"
          fi
          WRAPPER
          chmod +x bin/bb-mac

      - name: Create bb-linux (self-extracting wrapper)
        run: |
          chmod +x artifacts/bb-linux-x64/bb-linux-x64 artifacts/bb-linux-arm64/bb-linux-arm64
          tar -czf /tmp/bb-linux-bins.tar.gz \
            -C artifacts/bb-linux-x64 bb-linux-x64 \
            -C ../../artifacts/bb-linux-arm64 bb-linux-arm64
          TARB64=$(base64 < /tmp/bb-linux-bins.tar.gz)
          cat > bin/bb-linux << WRAPPER
          #!/bin/sh
          set -e
          ARCH=\$(uname -m)
          TMP=\$(mktemp -d)
          trap 'rm -rf "\$TMP"' EXIT
          echo '$TARB64' | base64 -d > "\$TMP/bins.tar.gz"
          tar -xzf "\$TMP/bins.tar.gz" -C "\$TMP"
          if [ "\$ARCH" = "x86_64" ]; then
            exec "\$TMP/bb-linux-x64" "\$@"
          elif [ "\$ARCH" = "aarch64" ] || [ "\$ARCH" = "arm64" ]; then
            exec "\$TMP/bb-linux-arm64" "\$@"
          else
            echo "Unsupported architecture: \$ARCH" >&2
            exit 1
          fi
          WRAPPER
          chmod +x bin/bb-linux

      - name: Finalize Windows binary
        run: cp artifacts/bb-win-x64.exe/bb-win-x64.exe bin/bb-win.exe

      - name: Verify
        run: |
          ls -la bin/
          test -f bin/bb-mac
          test -f bin/bb-linux
          test -f bin/bb-win.exe

      - uses: actions/upload-artifact@v4
        with:
          name: universal-binaries
          path: |
            bin/bb-mac
            bin/bb-linux
            bin/bb-win.exe
          retention-days: 7

  test-e2e:
    name: E2E Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Chrome (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm test
        env:
          CHROME_PATH: ${{ runner.os == 'Linux' && '/usr/bin/google-chrome' || '' }}

  test-binaries:
    name: Binary Tests (${{ matrix.name }})
    needs: assemble
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-22.04
            binary: bb-linux
          - name: linux-arm64
            os: ubuntu-22.04-arm
            binary: bb-linux
          - name: macos-x64
            os: macos-latest
            binary: bb-mac
          - name: macos-arm64
            os: macos-latest
            binary: bb-mac
          - name: windows
            os: windows-latest
            binary: bb-win.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/download-artifact@v4
        with:
          name: universal-binaries
          path: bin/

      - name: Install Chrome (Linux x64)
        if: matrix.name == 'linux-x64'
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Chromium (Linux arm64)
        if: matrix.name == 'linux-arm64'
        run: sudo apt-get update && sudo apt-get install -y chromium-browser

      - name: Make binary executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x bin/${{ matrix.binary }}

      - name: Run binary smoke tests
        run: node tests/e2e-binary.mjs bin/${{ matrix.binary }}

  publish-nightly:
    name: Publish Nightly Draft
    needs: [assemble, test-e2e, test-binaries]
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: universal-binaries
          path: bin/

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create nightly draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nightly-$(date +%Y%m%d-%H%M%S)"
          gh release create "$TAG" \
            --draft \
            --title "Nightly build v${{ steps.version.outputs.version }} ($(date +%Y-%m-%d))" \
            --notes "Automated nightly build from commit ${{ github.sha }}" \
            bin/bb-mac \
            bin/bb-linux \
            bin/bb-win.exe
